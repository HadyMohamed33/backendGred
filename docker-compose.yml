version: "3.9"

services:
  # ─── ASP.NET Core API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alnady_api
    restart: unless-stopped
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AlNadyDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;
      - ConnectionStrings__HangfireConnection=Server=sqlserver,1433;Database=AlNadyHangfireDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=AlNady
      - JwtSettings__Audience=AlNadyUsers
      - JwtSettings__ExpirationMinutes=60
      - EmailSettings__SmtpHost=${SMTP_HOST}
      - EmailSettings__SmtpPort=${SMTP_PORT}
      - EmailSettings__SmtpUser=${SMTP_USER}
      - EmailSettings__SmtpPass=${SMTP_PASS}
      - EmailSettings__FromEmail=${FROM_EMAIL}
      - EmailSettings__FromName=AlNady Platform
      - FileStorage__Provider=Local
      - FileStorage__Local__BasePath=/app/uploads
      - FileStorage__Local__BaseUrl=${API_BASE_URL}/uploads
      - PaymobSettings__ApiKey=${PAYMOB_API_KEY}
      - PaymobSettings__IntegrationId=${PAYMOB_INTEGRATION_ID}
      - PaymobSettings__HmacSecret=${PAYMOB_HMAC_SECRET}
      - StripeSettings__SecretKey=${STRIPE_SECRET_KEY}
      - StripeSettings__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - StripeSettings__SuccessUrl=${FRONTEND_URL}/payment/success
      - StripeSettings__CancelUrl=${FRONTEND_URL}/payment/cancel
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alnady_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: alnady_sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - alnady_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alnady_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - alnady_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MailHog (Dev Email) ──────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: alnady_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - alnady_network
    profiles:
      - dev

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  alnady_network:
    driver: bridge
